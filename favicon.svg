<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <radialGradient id="planetGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#4da6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </radialGradient>
    <path id="wave" d="M 0,100 Q 25,90 50,100 T 100,100 T 150,100 T 200,100" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>
  </defs>
  
  <!-- Planet circle -->
  <circle cx="100" cy="100" r="95" fill="url(#planetGradient)" stroke="#0052a3" stroke-width="2"/>
  
  <!-- Water waves -->
  <use href="#wave" y="20" opacity="0.9"/>
  <use href="#wave" y="50" opacity="0.8"/>
  <use href="#wave" y="80" opacity="0.7"/>
  
  <!-- Highlight for depth -->
  <ellipse cx="60" cy="60" rx="40" ry="40" fill="#66ccff" opacity="0.3"/>
</svg>